<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>GeeBot Chat Overlay</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 20px;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background: transparent;
            /* Essential for OBS */
        }

        #chat-container {
            display: flex;
            flex-direction: column-reverse;
            gap: 12px;
            width: 400px;
            max-height: 90vh;
        }

        .message {
            background: rgba(0, 0, 0, 0.7);
            border-left: 4px solid #53fc18;
            padding: 12px 16px;
            border-radius: 4px 12px 12px 4px;
            color: white;
            animation: slideIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
        }

        .sender {
            font-weight: 700;
            color: #53fc18;
            margin-bottom: 4px;
            font-size: 0.9rem;
        }

        .content {
            font-size: 1rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .bot-tag {
            background: #53fc18;
            color: black;
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
            font-weight: 800;
            vertical-align: middle;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .fade-out {
            animation: fadeOut 0.5s forwards;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: scale(0.95);
            }
        }
    </style>
</head>

<body>
    <div id="chat-container"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const container = document.getElementById('chat-container');

        socket.on('chatMessage', (data) => {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';

            const isBot = data.sender === 'GeeBot' || data.sender === 'Gee_Bot';
            const botTag = isBot ? '<span class="bot-tag">AI BOT</span>' : '';

            msgDiv.innerHTML = `
                <div class="sender">${data.sender}${botTag}</div>
                <div class="content">${data.content}</div>
            `;

            container.prepend(msgDiv);

            // Auto-hide message after 20 seconds
            setTimeout(() => {
                msgDiv.classList.add('fade-out');
                setTimeout(() => msgDiv.remove(), 500);
            }, 20000);

            // Limit visible messages
            if (container.children.length > 8) {
                container.lastElementChild.remove();
            }
        });

        // Listen for TTS Audio events from the bot
        socket.on('ttsAudio', (data) => {
            if (data.audio) {
                const audio = new Audio(data.audio);
                audio.play().catch(e => console.error("Audio playback failed:", e));
            }
        });
    </script>
</body>

</html>
